# Quick temp documentation on perms for now:
#
# aliien.itemblacklist.reload -> sets permission to reload the plugin (default: op)
# aliien.itemblacklist.bypass -> sets permission to bypass this plugin's restrictions (therefore lets you
# have the blacklisted items) (default: op)
# aliien.itemblacklist.alert -> sends an alert to whoever has this permission if someone has
# a blacklisted item (default: op)
#
# That's all, have fun!

blacklisted-items:
  - BEDROCK
  - BARRIER

############################################## Messages ########################################################

no-permission: "<red>You do not have permission to perform this command!"
reload: "<green>AliienItemBlacklist has been reloaded successfully!"
alert: "<red><bold>THE PLAYER %player% HAD A BLACKLISTED ITEM!"